<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game UI Kit — Fantasy (Vanilla JS)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Cinzel:wght@500;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../kit.css" />
  <link rel="stylesheet" href="../theme.css" />
  <style> body { margin: 0; background: var(--gk-bg, #0a0e1a); min-height: 100vh; padding: 40px; } </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { root, panel, bar, slotGrid, button, el } from "./gameui.js";
    const icons = Array.from({ length: 10 }, (_, i) => "../assets/cyberpunk/3_icons/icons/icon_" + String(i + 1).padStart(2, "0") + ".png");
    const ui = root("fantasy", [
      el("div", { style: { maxWidth: "720px", margin: "0 auto", display: "flex", flexDirection: "column", gap: "20px" } }, [
        panel("Built with JS", [
          el("p", {}, "This panel was constructed at runtime by gameui.js — no framework."),
          el("div", { class: "gk-stack", style: { maxWidth: "320px", marginTop: "12px" } }, [
            bar("Health", 72, "health"),
            bar("Mana", 48, "mana"),
          ]),
          el("div", { style: { marginTop: "16px" } }, [slotGrid(icons, 5)]),
          el("div", { class: "gk-row-flex", style: { marginTop: "16px" } }, [button("Confirm", true), button("Cancel")]),
        ]),
      ]),
    ]);
    document.getElementById("app").append(ui);
  </script>
</body>
</html>
