    <script type="module">
      import * as THREE from "three";
      import StatsGL from "stats-gl";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import GUI from "lil-gui";

      // ============================================================================
      // CONFIG - All tweakable parameters
      // ============================================================================

      const CONFIG = {
        // Forest
        TREE_COUNT: 400,
        FOREST_RADIUS: 80,
        CLEAR_RADIUS: 5,

        // Tree structure
        TRUNK_LENGTH_MIN: 4,
        TRUNK_LENGTH_MAX: 7,
        TRUNK_RADIUS_MIN: 0.18,
        TRUNK_RADIUS_MAX: 0.35,
        BRANCH_LEVELS: 4,
        BRANCH_ANGLE: 0.55,
        BRANCH_ANGLE_VARIANCE: 0.25,
        LENGTH_FALLOFF: 0.68,
        RADIUS_FALLOFF: 0.55,
        BRANCHES_PER_NODE: 3,
        TWIST: 0.5,

        // Leaves
        LEAF_SIZE: 0.8,
        LEAF_DENSITY: 4,
        LEAF_SPREAD: 0.8,

        // Colors
        BARK_COLOR: [0.24, 0.16, 0.09],
        BARK_DISTANT_TINT: [0.29, 0.52, 0.27], // Green tint for distant branches when leaves are culled
        LEAF_HUE_MIN: 0.25,
        LEAF_HUE_MAX: 0.35,
        LEAF_SATURATION: 0.55,
        LEAF_LIGHTNESS_MIN: 0.35,
        LEAF_LIGHTNESS_MAX: 0.5,

        // Leaf tinge (small percentage of leaves slightly yellowish or grayer)
        LEAF_TINGE_PERCENT: 0.15, // fraction of leaves that get a tinge (15%)
        LEAF_TINGE_YELLOW_CHANCE: 0.5, // of those tinged leaves, chance to be yellowish vs grayish
        LEAF_TINGE_HUE_SHIFT: 0.03, // yellowish: shift hue slightly toward yellow
        LEAF_TINGE_SAT_SHIFT: 0.28, // grayish: reduce saturation by this amount
        LEAF_TINGE_LIGHT_SHIFT: 0.09, // subtle lightness tweak for tinges

        // LOD (Level of Detail)
        LOD_FADE_START: 120, // Distance where leaves begin shrinking
        LOD_MAX_DISTANCE: 200, // Distance where leaves are fully culled
        LOD_SWAY_DISTANCE: 50, // Distance within which leaves animate
        LOD_SWAY_FADE_START: 30, // Distance where sway animation begins fading

        // Roots
        ROOT_SPREAD_MIN: 0.2,
        ROOT_SPREAD_MAX: 0.6,
        ROOT_HEIGHT_MIN: 0.3,
        ROOT_HEIGHT_MAX: 0.6,
        ROOT_BUMPS_MIN: 2,
        ROOT_BUMPS_MAX: 5,

        // Rendering
        BARK_SEGMENTS: 8,
        SUN_INTENSITY: 2.0,
        AMBIENT_INTENSITY: 0.9,
        EXPOSURE: 1.6,
      };

      // ============================================================================
      // PROCEDURAL LEAF TEXTURE
      // ============================================================================

      function createLeafTexture() {
        const size = 128;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        ctx.clearRect(0, 0, size, size);

        function leafPath(ctx) {
          const s = size;
          ctx.beginPath();
          ctx.moveTo(s * 0.5, s * 0.03);
          ctx.bezierCurveTo(
            s * 0.78,
            s * 0.18,
            s * 0.82,
            s * 0.65,
            s * 0.5,
            s * 0.97
          );
          ctx.bezierCurveTo(
            s * 0.18,
            s * 0.65,
            s * 0.22,
            s * 0.18,
            s * 0.5,
            s * 0.03
          );
        }

        // Brighter base gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, size);
        gradient.addColorStop(0, "#6ab560");
        gradient.addColorStop(0.3, "#5aa052");
        gradient.addColorStop(0.7, "#4a9045");
        gradient.addColorStop(1, "#3d8038");

        leafPath(ctx);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Noise overlay
        ctx.globalCompositeOperation = "overlay";
        for (let i = 0; i < 600; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const brightness = Math.random() * 40 - 20;
          ctx.fillStyle = `rgba(${128 + brightness}, ${128 + brightness}, ${
            128 + brightness
          }, 0.04)`;
          ctx.fillRect(x, y, 3, 3);
        }
        ctx.globalCompositeOperation = "source-over";

        // Clip to leaf shape for veins
        ctx.save();
        leafPath(ctx);
        ctx.clip();

        // Central vein - subtle
        ctx.strokeStyle = "rgba(35, 60, 30, 0.18)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(size * 0.5, size * 0.08);
        ctx.quadraticCurveTo(size * 0.5, size * 0.5, size * 0.5, size * 0.92);
        ctx.stroke();

        // Highlight along center
        ctx.strokeStyle = "rgba(140, 180, 130, 0.1)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(size * 0.5, size * 0.1);
        ctx.quadraticCurveTo(size * 0.48, size * 0.5, size * 0.5, size * 0.88);
        ctx.stroke();

        // Side veins - very subtle
        ctx.strokeStyle = "rgba(40, 65, 35, 0.1)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 6; i++) {
          const y = size * (0.2 + i * 0.11);
          const spread = size * (0.18 + i * 0.02);
          ctx.beginPath();
          ctx.moveTo(size * 0.5, y);
          ctx.quadraticCurveTo(
            size * 0.5 - spread * 0.5,
            y + size * 0.04,
            size * 0.5 - spread,
            y + size * 0.06
          );
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(size * 0.5, y);
          ctx.quadraticCurveTo(
            size * 0.5 + spread * 0.5,
            y + size * 0.04,
            size * 0.5 + spread,
            y + size * 0.06
          );
          ctx.stroke();
        }
        ctx.restore();

        // Soft edge darkening
        ctx.globalCompositeOperation = "source-atop";
        const edgeGradient = ctx.createRadialGradient(
          size / 2,
          size / 2,
          size * 0.15,
          size / 2,
          size / 2,
          size * 0.5
        );
        edgeGradient.addColorStop(0, "rgba(0,0,0,0)");
        edgeGradient.addColorStop(0.7, "rgba(0,0,0,0)");
        edgeGradient.addColorStop(1, "rgba(0,0,0,0.08)");
        ctx.fillStyle = edgeGradient;
        ctx.fillRect(0, 0, size, size);

        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;

        // --- Enable mipmaps ---
        texture.generateMipmaps = true;
        texture.minFilter = THREE.LinearMipmapLinearFilter;

        return texture;
      }

      // ============================================================================
      // INSTANCED FOREST GENERATOR
      // ============================================================================

      class InstancedForest {
        constructor(options = {}) {
          this.treeCount = options.treeCount ?? CONFIG.TREE_COUNT;
          this.forestRadius = options.forestRadius ?? CONFIG.FOREST_RADIUS;

          this.branchMatrices = [];
          this.leafMatrices = [];
          this.leafColors = [];
          this.leafRandoms = []; // Pre-computed random per leaf
          this.leafWobbleX = []; // Pre-computed wobble offset X
          this.leafWobbleY = []; // Pre-computed wobble offset Y
          this.leafSwayPhase = []; // Pre-computed per-leaf sway phase (single sin() in shader)

          this.group = new THREE.Group();
          this.meshes = {};

          this._matrix = new THREE.Matrix4();
          this._quaternion = new THREE.Quaternion();
          this._scale = new THREE.Vector3();
          this._up = new THREE.Vector3(0, 1, 0);
          this._color = new THREE.Color();

          this._leafGeo = new THREE.PlaneGeometry(1, 1);
          this._leafGeo.computeBoundingBox(); // only once
          this._leafBottomY = this._leafGeo.boundingBox.min.y;
        }

        _mulberry32(seed) {
          return () => {
            let t = (seed += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        generate(leafTexture, barkTexture) {
          this.branchMatrices = [];
          this.leafMatrices = [];
          this.leafColors = [];
          this.leafRandoms = [];
          this.leafWobbleX = [];
          this.leafWobbleY = [];
          this.leafSwayPhase = [];

          // Tree type presets for variety
          const treeTypes = [
            {
              levels: 4,
              branchAngle: 0.5,
              lengthFalloff: 0.7,
              radiusFalloff: 0.55,
              branches: 3,
            },
            {
              levels: 5,
              branchAngle: 0.4,
              lengthFalloff: 0.65,
              radiusFalloff: 0.5,
              branches: 2,
            },
            {
              levels: 4,
              branchAngle: 0.65,
              lengthFalloff: 0.72,
              radiusFalloff: 0.6,
              branches: 4,
            },
            {
              levels: 3,
              branchAngle: 0.55,
              lengthFalloff: 0.75,
              radiusFalloff: 0.58,
              branches: 3,
            },
            {
              levels: 4,
              branchAngle: 0.48,
              lengthFalloff: 0.68,
              radiusFalloff: 0.52,
              branches: 3,
            },
          ];

          for (let i = 0; i < this.treeCount; i++) {
            const rand = this._mulberry32(i * 54321 + 11111);

            // Position
            const r =
              CONFIG.CLEAR_RADIUS + Math.sqrt(rand()) * this.forestRadius;
            const theta = rand() * Math.PI * 2;
            const treeX = Math.cos(theta) * r;
            const treeZ = Math.sin(theta) * r;
            const treeRotation = rand() * Math.PI * 2;

            // Pick tree type
            const typeIndex = Math.floor(rand() * treeTypes.length);
            const treeType = treeTypes[typeIndex];

            // Per-tree variation
            const treeScale = 0.6 + rand() * 0.8;
            const leafHue =
              CONFIG.LEAF_HUE_MIN +
              rand() * (CONFIG.LEAF_HUE_MAX - CONFIG.LEAF_HUE_MIN);
            const leafLightness =
              CONFIG.LEAF_LIGHTNESS_MIN +
              rand() * (CONFIG.LEAF_LIGHTNESS_MAX - CONFIG.LEAF_LIGHTNESS_MIN);
            const trunkLength =
              (CONFIG.TRUNK_LENGTH_MIN +
                rand() * (CONFIG.TRUNK_LENGTH_MAX - CONFIG.TRUNK_LENGTH_MIN)) *
              treeScale;
            const trunkRadius =
              (CONFIG.TRUNK_RADIUS_MIN +
                rand() * (CONFIG.TRUNK_RADIUS_MAX - CONFIG.TRUNK_RADIUS_MIN)) *
              treeScale;

            this._generateTree(
              treeX,
              treeZ,
              treeRotation,
              treeScale,
              leafHue,
              leafLightness,
              trunkLength,
              trunkRadius,
              treeType,
              rand
            );
          }

          this._buildMeshes(leafTexture, barkTexture);

          return {
            group: this.group,
            stats: {
              trees: this.treeCount,
              branches: this.branchMatrices.length,
              leaves: this.leafMatrices.length,
            },
          };
        }

        _generateTree(
          x,
          z,
          rotation,
          scale,
          leafHue,
          leafLightness,
          trunkLength,
          trunkRadius,
          treeType,
          rand
        ) {
          const origin = new THREE.Vector3(x, 0, z);
          const direction = new THREE.Vector3(0, 1, 0);

          // Slight tilt
          direction.x += (rand() - 0.5) * 0.12;
          direction.z += (rand() - 0.5) * 0.12;
          direction.normalize();

          this._branch(
            origin,
            direction,
            trunkLength,
            trunkRadius,
            0,
            rotation,
            scale,
            leafHue,
            leafLightness,
            treeType,
            rand
          );
        }

        _branch(
          start,
          direction,
          length,
          radius,
          level,
          treeRotation,
          treeScale,
          leafHue,
          leafLightness,
          treeType,
          rand
        ) {
          if (level > treeType.levels || radius < 0.012) return;

          const end = start.clone().addScaledVector(direction, length);
          const mid = start.clone().lerp(end, 0.5);

          // Branch matrix
          this._quaternion.setFromUnitVectors(
            this._up,
            direction.clone().normalize()
          );
          const topRadius = radius * treeType.radiusFalloff;
          const avgRadius = (radius + topRadius) * 0.5;
          this._scale.set(avgRadius, length, avgRadius);
          this._matrix.compose(mid, this._quaternion, this._scale);
          this.branchMatrices.push(this._matrix.clone());

          // Leaves at terminal branches - connected to branch end
          if (level >= treeType.levels - 1) {
            this._addLeaves(
              end,
              direction,
              treeScale,
              leafHue,
              leafLightness,
              rand,
              topRadius,
              level,
              treeType.levels
            );
          }

          // Child branches
          if (level < treeType.levels) {
            const numChildren =
              level === 0
                ? treeType.branches + Math.floor(rand() * 2)
                : Math.max(1, treeType.branches - Math.floor(level * 0.3));

            for (let i = 0; i < numChildren; i++) {
              const twistAngle =
                (i / numChildren) * Math.PI * 2 +
                rand() * CONFIG.TWIST +
                treeRotation;
              const bendAngle =
                treeType.branchAngle +
                (rand() - 0.5) * CONFIG.BRANCH_ANGLE_VARIANCE * 2;

              const perp = new THREE.Vector3(1, 0, 0);
              if (Math.abs(direction.y) < 0.9) {
                perp.crossVectors(this._up, direction).normalize();
              } else {
                perp
                  .crossVectors(new THREE.Vector3(0, 0, 1), direction)
                  .normalize();
              }

              const childDir = direction.clone();
              childDir.applyAxisAngle(perp, bendAngle);
              childDir.applyAxisAngle(direction, twistAngle);
              childDir.normalize();

              const startT = 0.4 + rand() * 0.5;
              const childStart = start.clone().lerp(end, startT);
              const childLength =
                length * treeType.lengthFalloff * (0.8 + rand() * 0.4);
              const childRadius = radius * treeType.radiusFalloff;

              this._branch(
                childStart,
                childDir,
                childLength,
                childRadius,
                level + 1,
                treeRotation,
                treeScale,
                leafHue,
                leafLightness,
                treeType,
                rand
              );
            }
          }
        }

        _addLeaves(
          branchEnd,
          branchDir,
          treeScale,
          leafHue,
          leafLightness,
          rand,
          topRadius,
          level,
          maxLevel
        ) {
          const count = CONFIG.LEAF_DENSITY + Math.floor(rand() * 3);
          const size = CONFIG.LEAF_SIZE * treeScale;
          const spread = CONFIG.LEAF_SPREAD * treeScale;

          // Compute perpendicular axes to branch direction
          const perp1 = new THREE.Vector3(1, 0, 0);
          if (Math.abs(branchDir.y) > 0.9) perp1.set(0, 0, 1);
          perp1.crossVectors(branchDir, perp1).normalize();
          const perp2 = new THREE.Vector3()
            .crossVectors(branchDir, perp1)
            .normalize();

          for (let i = 0; i < count; i++) {
            // Angle around the branchleafScale
            const aroundAngle = rand() * Math.PI * 2;

            // How far along the branch tip (negative = back on branch)
            const alongBranch = -spread * 0.4 + rand() * spread * 0.5;

            // Outward direction from branch center at this angle
            const outward = new THREE.Vector3()
              .addScaledVector(perp1, Math.cos(aroundAngle))
              .addScaledVector(perp2, Math.sin(aroundAngle))
              .normalize();

            // Use the actual branch tip radius
            const branchRadius = topRadius;
            // Attach leaf directly on branch surface (no negative along-branch offset)
            const attachPoint = branchEnd
              .clone()
              .addScaledVector(outward, branchRadius);

            // Leaf stem direction: outward from branch + along branch + slight upward
            const stemDir = new THREE.Vector3()
              .addScaledVector(outward, 0.5 + rand() * 0.3)
              .addScaledVector(branchDir, 0.3 + rand() * 0.4)
              .add(new THREE.Vector3(0, 0.2 + rand() * 0.3, 0))
              .normalize();

            // Leaf orientation: tip points along stem direction (Y axis of leaf)
            const leafUp = stemDir.clone();

            // Leaf face normal: perpendicular to stem, biased upward
            let leafNormal = new THREE.Vector3(0, 1, 0).addScaledVector(
              outward,
              (rand() - 0.5) * 0.5
            );
            leafNormal
              .sub(leafUp.clone().multiplyScalar(leafNormal.dot(leafUp)))
              .normalize();

            if (leafNormal.lengthSq() < 0.1) {
              leafNormal.copy(outward);
              leafNormal
                .sub(leafUp.clone().multiplyScalar(leafNormal.dot(leafUp)))
                .normalize();
            }

            // Build rotation matrix (frame BEFORE jitter)
            const leafRight = new THREE.Vector3()
              .crossVectors(leafUp, leafNormal)
              .normalize();
            leafNormal.crossVectors(leafRight, leafUp).normalize();

            const rotMatrix = new THREE.Matrix4();
            rotMatrix.makeBasis(leafRight, leafUp, leafNormal);

            // Apply small random jitter BEFORE positioning
            const jitterQuat = new THREE.Quaternion().setFromEuler(
              new THREE.Euler(
                (rand() - 0.5) * 0.3,
                (rand() - 0.5) * 0.3,
                (rand() - 0.5) * 0.2
              )
            );
            const leafQuat = new THREE.Quaternion().setFromRotationMatrix(
              rotMatrix
            );
            leafQuat.multiply(jitterQuat);

            // PlaneGeometry is 1x1, centered at origin. Local bottom Y = -0.5
            const localBottom = new THREE.Vector3(0, this._leafBottomY, 0);

            // Rotate bottom by leaf rotation (including jitter now!)
            const rotatedBottom = localBottom.clone().applyQuaternion(leafQuat);

            // Compute leaf scale
            // subtle taper: leaves at top ~80–100% size
            const taperFactor = 0.8 + 0.2 * (1 - level / maxLevel); // 0.8 → 1.0 from top to base
            const leafScale = size * (0.5 + rand() * 0.5) * taperFactor;

            // Compute final leaf position so bottom lands at attachPoint
            const leafPos = attachPoint
              .clone()
              .sub(rotatedBottom.clone().multiplyScalar(leafScale));

            // Compose final matrix
            this._scale.set(leafScale, leafScale, leafScale);
            this._matrix.compose(leafPos, leafQuat, this._scale);
            this.leafMatrices.push(this._matrix.clone());

            // Base color with small per-leaf variation
            let h = leafHue + (rand() - 0.5) * 0.05;
            let s = CONFIG.LEAF_SATURATION + rand() * 0.15;
            let l = leafLightness + (rand() - 0.5) * 0.08;

            // Small fraction of leaves get a tint (either slightly yellower or slightly grayer)
            if (rand() < CONFIG.LEAF_TINGE_PERCENT) {
              if (rand() < CONFIG.LEAF_TINGE_YELLOW_CHANCE) {
                // yellowish tinge: shift hue a little toward warm
                h += CONFIG.LEAF_TINGE_HUE_SHIFT;
                l = Math.min(1.0, l + CONFIG.LEAF_TINGE_LIGHT_SHIFT);
              } else {
                // grayish tinge: reduce saturation slightly, slightly darker
                s = Math.max(0.0, s - CONFIG.LEAF_TINGE_SAT_SHIFT);
                l = Math.max(0.0, l - CONFIG.LEAF_TINGE_LIGHT_SHIFT);
              }
            }

            this._color.setHSL(h, s, l);
            this.leafColors.push(this._color.r, this._color.g, this._color.b);

            // Pre-compute random values for shader (optimization)
            const leafRand = rand();
            const wobbleX = (rand() - 0.5) * 0.12;
            const wobbleY = (rand() - 0.5) * 0.12;

            // Single per-leaf sway phase (we'll use a single sin(time + phase) in the shader)
            const swayPhase = rand() * Math.PI * 2.0;

            this.leafRandoms.push(leafRand);
            this.leafWobbleX.push(wobbleX);
            this.leafWobbleY.push(wobbleY);
            this.leafSwayPhase.push(swayPhase);
          }
        }

        _buildMeshes(leafTexture, barkTexture) {
          // Clear previous
          while (this.group.children.length > 0) {
            const child = this.group.children[0];
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
            this.group.remove(child);
          }

          // --- BARK ---
          if (this.branchMatrices.length > 0) {
            const barkGeo = new THREE.CylinderGeometry(
              1,
              1,
              1,
              CONFIG.BARK_SEGMENTS,
              1
            );
            // PERFORMANCE: Custom shader replaces MeshStandardMaterial to enable
            // distance-based green tinting. When leaves are culled at distance,
            // branches shift toward green to maintain visual density. This is
            // essentially free - one smoothstep in vertex, one mix in fragment.
            const barkMat = new THREE.ShaderMaterial({
              uniforms: {
                barkTexture: { value: barkTexture },
                barkColor: { value: new THREE.Color(...CONFIG.BARK_COLOR) },
                leafTintColor: {
                  value: new THREE.Color(...CONFIG.BARK_DISTANT_TINT),
                },
                sunDirection: {
                  value: new THREE.Vector3(0.5, 1.0, 0.3).normalize(),
                },
                sunColor: { value: new THREE.Color(1.0, 0.98, 0.9) },
                ambientLight: { value: new THREE.Color(0.5, 0.52, 0.48) },
                leafFadeStart: { value: CONFIG.LOD_FADE_START },
                maxLeafDistance: { value: CONFIG.LOD_MAX_DISTANCE },
                rootSpreadMin: { value: CONFIG.ROOT_SPREAD_MIN },
                rootSpreadMax: { value: CONFIG.ROOT_SPREAD_MAX },
                rootHeightMin: { value: CONFIG.ROOT_HEIGHT_MIN },
                rootHeightMax: { value: CONFIG.ROOT_HEIGHT_MAX },
                rootBumpsMin: { value: CONFIG.ROOT_BUMPS_MIN },
                rootBumpsMax: { value: CONFIG.ROOT_BUMPS_MAX },
              },
              vertexShader: `
                uniform float leafFadeStart;
                uniform float maxLeafDistance;
                uniform float rootSpreadMin;
                uniform float rootSpreadMax;
                uniform float rootHeightMin;
                uniform float rootHeightMax;
                uniform float rootBumpsMin;
                uniform float rootBumpsMax;
                    
                varying vec3 vNormal;
                varying vec3 vWorldPosition;
                varying float vLeafTint;
                varying vec2 vUv;
                varying float vTreeRand;
                
                void main() {
                  vec3 pos = position;
                  
                  // First compute world position to check if we're near ground
                  vec4 worldPos = instanceMatrix * vec4(pos, 1.0);
                  
                  // Store instance center for later use
                  vec4 instanceCenter = instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);

                  // Per-tree random values derived from position (0.0 to 1.0)
                  float treeRand1 = fract(sin(instanceCenter.x * 12.9898 + instanceCenter.z * 78.233) * 43758.5453);
                  float treeRand2 = fract(sin(instanceCenter.x * 63.7264 + instanceCenter.z * 10.873) * 43758.5453);
                  float treeRand3 = fract(sin(instanceCenter.x * 36.1734 + instanceCenter.z * 91.147) * 43758.5453);

                  // Per-tree root parameters
                  float rootSpread = mix(rootSpreadMin, rootSpreadMax, treeRand1);
                  float rootHeight = mix(rootHeightMin, rootHeightMax, treeRand2);
                  float rootBumps = floor(mix(rootBumpsMin, rootBumpsMax + 1.0, treeRand3));

                  // ROOT SPREAD: Flare out vertices near ground level
                  if (worldPos.y < rootHeight) {
                    float rootFactor = 1.0 - (worldPos.y / rootHeight);
                    rootFactor = rootFactor * rootFactor;
                    
                    vec2 outwardDir = worldPos.xz - instanceCenter.xz;
                    float outwardLen = length(outwardDir);
                    if (outwardLen > 0.001) {
                      outwardDir /= outwardLen;
                    } else {
                      outwardDir = vec2(1.0, 0.0);
                    }
                    
                    float angle = atan(worldPos.z - instanceCenter.z, worldPos.x - instanceCenter.x);
                    float treeSeed = fract(instanceCenter.x * 12.9898 + instanceCenter.z * 78.233) * 6.28;
                    float bumpiness = 1.0 + 0.7 * sin(angle * rootBumps + treeSeed);
                    
                    float spreadAmount = rootFactor * rootSpread * bumpiness * outwardLen * 3.0;
                    worldPos.xz += outwardDir * spreadAmount;
                    worldPos.y -= rootFactor * 0.15;
                  }
                  
                  vWorldPosition = worldPos.xyz;
                  
                  // SIMPLE NORMAL: For a cylinder, the normal points outward from the axis.
                  // Compute normal as direction from branch center to this vertex in world space.
                  vec3 toVertex = worldPos.xyz - instanceCenter.xyz;
                  // Project onto the plane perpendicular to branch axis (remove Y component in local space)
                  // Since branches can be rotated, we approximate by using world XZ
                  vec3 approxNormal = normalize(vec3(toVertex.x, 0.0, toVertex.z));
                  // Blend with actual normal for caps
                  if (abs(normal.y) > 0.9) {
                    // This is a cap vertex, use vertical normal
                    approxNormal = vec3(0.0, sign(normal.y), 0.0);
                  }
                  vNormal = approxNormal;
                  
                  // VISUAL TRICK: As leaves disappear at distance, tint branches green
                  float dist = length(cameraPosition - vWorldPosition);
                  float safeFadeStart = min(leafFadeStart, maxLeafDistance - 1.0);
                  vLeafTint = smoothstep(safeFadeStart, maxLeafDistance, dist);

                  // UV based on world position for seamless tiling
                  float uvAngle = atan(worldPos.z - instanceCenter.z, worldPos.x - instanceCenter.x);
                  vUv = vec2(uvAngle * 1.5, worldPos.y * 0.5);
                  vTreeRand = treeRand1;
                  
                  gl_Position = projectionMatrix * viewMatrix * worldPos;
                }
              `,
              fragmentShader: `
                uniform sampler2D barkTexture;
                uniform vec3 barkColor;
                uniform vec3 leafTintColor;
                
                varying vec3 vNormal;
                varying vec3 vWorldPosition;
                varying float vLeafTint;
                varying vec2 vUv;
                varying float vTreeRand;
                
                void main() {
                  vec3 N = normalize(vNormal);
                  vec3 L = normalize(vec3(0.5, 1.0, 0.3));
                  float NdotL = max(dot(N, L), 0.0);
                  
                  // Sample bark texture with wrapped UVs
                  vec2 wrappedUV = fract(vUv);
                  vec3 texColor = texture2D(barkTexture, wrappedUV).rgb;
                  
                  // Per-tree variation: brightness 0.8-1.2, slight hue shift
                  float brightness = 0.85 + vTreeRand * 0.3;
                  vec3 baseColor = mix(barkColor, texColor, 0.7) * 1.8 * brightness;

                  // Slight warm/cool shift per tree
                  baseColor *= vec3(1.0 + (vTreeRand - 0.5) * 0.1, 1.0, 1.0 - (vTreeRand - 0.5) * 0.1);
                  
                  // Blend toward leafy green at distance
                  baseColor = mix(baseColor, leafTintColor, vLeafTint * 0.7);
                  
                  // Stronger lighting contrast
                  vec3 litColor = baseColor * (0.3 + NdotL * 0.7);
                  
                  gl_FragColor = vec4(litColor, 1.0);
                }
              `,
            });

            const barkMesh = new THREE.InstancedMesh(
              barkGeo,
              barkMat,
              this.branchMatrices.length
            );
            barkMesh.frustumCulled = true;
            barkMesh.castShadow = true;
            barkMesh.receiveShadow = true;

            for (let i = 0; i < this.branchMatrices.length; i++) {
              barkMesh.setMatrixAt(i, this.branchMatrices[i]);
            }
            barkMesh.instanceMatrix.needsUpdate = true;
            this.group.add(barkMesh);
            this.meshes.bark = barkMesh;
            this.barkMat = barkMat;
          }

          // --- LEAVES ---
          if (this.leafMatrices.length > 0) {
            const leafGeo = this._leafGeo; // reuse the precomputed geometry

            const leafMat = new THREE.ShaderMaterial({
              uniforms: {
                leafTexture: { value: leafTexture },
                sunDirection: {
                  value: new THREE.Vector3(0.5, 1.0, 0.3).normalize(),
                },
                sunColor: { value: new THREE.Color(1.0, 0.98, 0.9) },
                ambientLight: { value: new THREE.Color(0.65, 0.7, 0.6) },
                time: { value: 0.0 },
                maxLeafDistance: { value: CONFIG.LOD_MAX_DISTANCE },
                leafFadeStart: { value: CONFIG.LOD_FADE_START },
              },
              vertexShader: `
                  attribute vec3 instanceColorAttr;
                  attribute float instanceRandom;
                  attribute float instanceWobbleX;
                  attribute float instanceWobbleY;
                  attribute float instanceSwayPhase;
                  uniform float time;
                  uniform float maxLeafDistance;
                  uniform float leafFadeStart;
                  
                  varying vec2 vUv;
                  varying vec3 vColor;
                  varying vec3 vWorldPosition;
                  varying vec3 vNormal;
                  varying float vRandom;
                  
                  void main() {
                    // PERFORMANCE: Vertex-shader LOD culling
                    // Extract instance world position from the 4th column of instanceMatrix
                    vec3 instancePos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                    float dist = length(cameraPosition - instancePos);
                    
                    // PERFORMANCE: Collapse distant leaves to degenerate triangles.
                    // Unlike fragment discard, this skips rasterization entirely.
                    // GPU detects zero-area triangles and culls them before fragment stage.
                    if (dist > maxLeafDistance) {
                      gl_Position = vec4(0.0, 0.0, 0.0, 1.0);
                      vUv = vec2(0.0);
                      vColor = vec3(0.0);
                      vRandom = 0.0;
                      vWorldPosition = vec3(0.0);
                      vNormal = vec3(0.0, 1.0, 0.0);
                      return;
                    }
                    
                    // PERFORMANCE: Gradual size reduction reduces overdraw in mid-distance.
                    // Leaves shrink up to 50% between fadeStart and maxDistance.
                    // Combined with bark green-tinting, this makes LOD transitions invisible.
                    // Defensive: ensure fadeStart < maxDistance to avoid smoothstep artifacts
                    float safeFadeStart = min(leafFadeStart, maxLeafDistance - 1.0);
                    float lodScale = 1.0 - smoothstep(safeFadeStart, maxLeafDistance, dist) * 0.5;
                    
                    vUv = uv;
                    vColor = instanceColorAttr;
                    vRandom = instanceRandom;
                    
                    vec3 pos = position * lodScale;

                    // Shape wobble - using pre-computed values
                    float edgeDist = max(abs(pos.x), abs(pos.y)) * 2.0;
                    pos.x += instanceWobbleX * edgeDist;
                    pos.y += instanceWobbleY * edgeDist;
                    pos.x += pos.y * 0.08 * instanceWobbleX;
                    pos *= 0.94 + instanceRandom * 0.12;

                    // PERFORMANCE: Skip sway animation for distant leaves.
                    // sin() is expensive; skipping it for 80%+ of leaves saves ALU cycles.
                    if (dist < ${CONFIG.LOD_SWAY_DISTANCE.toFixed(1)}) {
                      // Smooth fade-out prevents popping when crossing threshold
                      float swayFactor = clamp(1.0 - (dist - ${CONFIG.LOD_SWAY_FADE_START.toFixed(
                        1
                      )}) / ${(
                CONFIG.LOD_SWAY_DISTANCE - CONFIG.LOD_SWAY_FADE_START
              ).toFixed(1)}, 0.0, 1.0);

                      // PERFORMANCE: Single sin() per vertex instead of multiple trig calls.
                      // instanceSwayPhase is pre-computed on CPU - no hash() in shader.
                      float s = sin(time * 1.2 + instanceSwayPhase);

                      // Apply sway in world space for more visible effect
                      pos.x += s * 0.08 * swayFactor;
                      pos.z += s * 0.05 * swayFactor;
                    }

                    vec4 worldPos = instanceMatrix * vec4(pos, 1.0);
                    vWorldPosition = worldPos.xyz;
                    vNormal = normalize((instanceMatrix * vec4(normal, 0.0)).xyz);

                    gl_Position = projectionMatrix * viewMatrix * worldPos;
                  }
                `,

              fragmentShader: `
                precision mediump float;  // PERFORMANCE: highp not needed for color math
                uniform sampler2D leafTexture;
                uniform vec3 sunDirection;
                uniform vec3 sunColor;
                uniform vec3 ambientLight;
                
                varying vec2 vUv;
                varying vec3 vColor;
                varying vec3 vWorldPosition;
                varying vec3 vNormal;
                varying float vRandom;
            
                void main() {
                  vec4 texColor = texture2D(leafTexture, vUv);
                  if (texColor.a < 0.5) discard;
                  
                  vec3 N = normalize(vNormal);
                  vec3 L = normalize(sunDirection);
                  vec3 V = normalize(cameraPosition - vWorldPosition);
                  if (!gl_FrontFacing) N = -N;
                  
                  float NdotL = max(dot(N, L), 0.0);
                  
                  // Cheap top-down shadow approximation
                  float leafShadow = smoothstep(0.0, 1.0, dot(N, L) * 0.5 + 0.5);
                  float diffuse = NdotL * 0.8 * leafShadow;
                  float fresnel = pow(1.0 - max(dot(N, V), 0.0), 3.0) * 0.1;
                  float sss = pow(max(dot(-N, L), 0.0), 2.0) * 0.35;
                  
                  vec3 baseColor = vColor * texColor.rgb;
                  baseColor *= 0.92 + vRandom * 0.16;
                  
                  // Simple AO: darken leaves lower in the tree slightly
                  float ao = exp(-vWorldPosition.y * 0.1);
                  baseColor *= 0.85 + 0.15 * ao;
                  
                  vec3 litColor = baseColor * (ambientLight + sunColor * (diffuse + sss)) + fresnel * vec3(0.7, 0.8, 0.6);
                  
                  gl_FragColor = vec4(litColor, 1.0);
                }
              `,
              side: THREE.DoubleSide,
            });

            const leafMesh = new THREE.InstancedMesh(
              leafGeo,
              leafMat,
              this.leafMatrices.length
            );
            leafMesh.frustumCulled = true;
            leafMesh.castShadow = true;
            leafMesh.receiveShadow = false;

            for (let i = 0; i < this.leafMatrices.length; i++) {
              leafMesh.setMatrixAt(i, this.leafMatrices[i]);
            }
            leafMesh.instanceMatrix.needsUpdate = true;

            const colorArray = new Float32Array(this.leafColors);
            leafMesh.geometry.setAttribute(
              "instanceColorAttr",
              new THREE.InstancedBufferAttribute(colorArray, 3)
            );

            // Pre-computed random values (optimization - no hash() in shader)
            const randomArray = new Float32Array(this.leafRandoms);
            leafMesh.geometry.setAttribute(
              "instanceRandom",
              new THREE.InstancedBufferAttribute(randomArray, 1)
            );

            const wobbleXArray = new Float32Array(this.leafWobbleX);
            leafMesh.geometry.setAttribute(
              "instanceWobbleX",
              new THREE.InstancedBufferAttribute(wobbleXArray, 1)
            );

            const wobbleYArray = new Float32Array(this.leafWobbleY);
            leafMesh.geometry.setAttribute(
              "instanceWobbleY",
              new THREE.InstancedBufferAttribute(wobbleYArray, 1)
            );

            // Add precomputed sway phase attribute (single-sin optimization)
            const swayPhaseArray = new Float32Array(this.leafSwayPhase);
            leafMesh.geometry.setAttribute(
              "instanceSwayPhase",
              new THREE.InstancedBufferAttribute(swayPhaseArray, 1)
            );

            this.group.add(leafMesh);
            this.meshes.leaves = leafMesh;
            this.leafMat = leafMat; // Store reference for time updates
          }
        }

        dispose() {
          for (const mesh of Object.values(this.meshes)) {
            if (mesh) {
              mesh.geometry.dispose();
              mesh.material.dispose();
            }
          }
        }
      }

      // ============================================================================
      // SCENE SETUP
      // ============================================================================

      const container = document.getElementById("container");
      const scene = new THREE.Scene();

      // Sky
      const skyGeo = new THREE.SphereGeometry(500, 32, 16);
      const skyMat = new THREE.ShaderMaterial({
        uniforms: {
          topColor: { value: new THREE.Color(0x6baed6) },
          bottomColor: { value: new THREE.Color(0xddeeff) },
        },
        vertexShader: `
    varying vec3 vWorldPosition;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPosition = worldPos.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
        fragmentShader: `
    uniform vec3 topColor;
    uniform vec3 bottomColor;
    varying vec3 vWorldPosition;
    void main() {
      float h = normalize(vWorldPosition).y;
      gl_FragColor = vec4(mix(bottomColor, topColor, pow(max(h, 0.0), 0.6)), 1.0);
    }
  `,
        side: THREE.BackSide,
        depthWrite: false,
      });
      scene.add(new THREE.Mesh(skyGeo, skyMat));

      const camera = new THREE.PerspectiveCamera(
        55,
        container.clientWidth / container.clientHeight,
        0.1,
        2000
      );
      camera.position.set(0, 12, 35);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        precision: "highp",
        powerPreference: "high-performance",
      });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.physicallyCorrectLights = true;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = CONFIG.EXPOSURE;
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = false;
      controls.target.set(0, 6, 0);
      controls.minDistance = 0.1;
      controls.maxDistance = 800;
      controls.maxPolarAngle = Math.PI / 2;

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, CONFIG.AMBIENT_INTENSITY));

      const sun = new THREE.DirectionalLight(0xfff8e7, CONFIG.SUN_INTENSITY);
      sun.position.set(50, 100, 40);
      sun.castShadow = true;
      sun.shadow.mapSize.width = 2048;
      sun.shadow.mapSize.height = 2048;
      sun.shadow.camera.near = 10;
      sun.shadow.camera.far = 300;
      sun.shadow.camera.left = -200;
      sun.shadow.camera.right = 200;
      sun.shadow.camera.top = 200;
      sun.shadow.camera.bottom = -200;
      sun.shadow.bias = -0.0002;
      sun.shadow.normalBias = 0.02; // pushes shadow along surface normal
      sun.shadow.radius = 2; // Soft shadow blur (only works with PCFSoftShadowMap)
      scene.add(sun);

      scene.add(new THREE.HemisphereLight(0xaaddff, 0x88aa66, 0.5));

      // Ground
      const groundGeo = new THREE.CircleGeometry(200, 64);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x5a8050,
        roughness: 0.9,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      /* ---------- Shadow Select ---------- */
      function updateShadowQuality(quality) {
        if (!scene) return;

        let newSize;

        switch (quality) {
          case "none":
            sun.castShadow = false;
            renderer.shadowMap.enabled = false;
            renderer.shadowMap.needsUpdate = true;
            return;

          case "low":
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowMap;
            sun.castShadow = true;
            newSize = 512;
            break;

          case "medium":
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            sun.castShadow = true;
            newSize = 1024;
            break;

          case "high":
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            sun.castShadow = true;
            newSize = 2048;
            break;
        }

        // Only dispose and regenerate if size actually changed
        if (sun.shadow.mapSize.width !== newSize) {
          sun.shadow.map?.dispose();
          sun.shadow.map = null;
          sun.shadow.mapSize.width = newSize;
          sun.shadow.mapSize.height = newSize;
          sun.shadow.needsUpdate = true;
          renderer.shadowMap.needsUpdate = true;
        } else {
          // Even if size didn't change, still force update when re-enabling
          sun.shadow.needsUpdate = true;
          renderer.shadowMap.needsUpdate = true;
        }
      }

      // ============================================================================
      // FOREST
      // ============================================================================

      const leafTexture = createLeafTexture();
      const barkTexture = createBarkTexture();
      let forest = new InstancedForest();
      let stats = { trees: 0, branches: 0, leaves: 0 };

      const params = {
        treeCount: CONFIG.TREE_COUNT,
        forestRadius: CONFIG.FOREST_RADIUS,
        regenerate: generateForest,
      };

      function generateForest() {
        if (forest.group.parent) scene.remove(forest.group);
        forest.dispose();

        forest = new InstancedForest({
          treeCount: params.treeCount,
          forestRadius: params.forestRadius,
        });

        const result = forest.generate(leafTexture, barkTexture);
        stats = result.stats;
        scene.add(result.group);

        document.getElementById("statTrees").textContent = stats.trees;
        document.getElementById("statBranches").textContent =
          stats.branches.toLocaleString();
        document.getElementById("statLeaves").textContent =
          stats.leaves.toLocaleString();
      }

      function createBarkTexture() {
        const size = 256;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Base brown
        ctx.fillStyle = "#4a3520";
        ctx.fillRect(0, 0, size, size);

        // Vertical streaks (bark grain)
        for (let i = 0; i < 40; i++) {
          const x = Math.random() * size;
          const width = 1 + Math.random() * 4;
          const lightness = Math.random() > 0.5 ? 25 : -25;
          ctx.fillStyle = `rgba(${100 + lightness}, ${60 + lightness}, ${
            30 + lightness
          }, 0.4)`;
          ctx.fillRect(x, 0, width, size);
        }

        // Horizontal cracks
        for (let i = 0; i < 20; i++) {
          const y = Math.random() * size;
          ctx.strokeStyle = `rgba(0, 0, 0, ${0.15 + Math.random() * 0.25})`;
          ctx.lineWidth = 1 + Math.random() * 2;
          ctx.beginPath();
          ctx.moveTo(0, y);
          for (let x = 0; x < size; x += 8) {
            ctx.lineTo(x, y + (Math.random() - 0.5) * 6);
          }
          ctx.stroke();
        }

        // Light highlights (raised bark)
        for (let i = 0; i < 15; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const w = 5 + Math.random() * 15;
          const h = 20 + Math.random() * 40;
          ctx.fillStyle = `rgba(160, 120, 80, ${0.1 + Math.random() * 0.15})`;
          ctx.fillRect(x, y, w, h);
        }

        // Fine noise for roughness
        for (let i = 0; i < 800; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const b = Math.random() > 0.5 ? 35 : -35;
          ctx.fillStyle = `rgba(${100 + b}, ${65 + b}, ${35 + b}, 0.15)`;
          ctx.fillRect(x, y, 2, 2);
        }

        // Dark knots
        for (let i = 0; i < 5; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const r = 3 + Math.random() * 8;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(20, 10, 5, ${0.3 + Math.random() * 0.3})`;
          ctx.fill();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.generateMipmaps = true;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        return texture;
      }

      generateForest();

      // ============================================================================
      // GUI
      // ============================================================================

      const gui = new GUI({ title: "Controls" });

      const envFolder = gui.addFolder("Environment & Shadows");
      const shadowSettings = { quality: "high" };
      envFolder
        .add(shadowSettings, "quality", ["none", "low", "medium", "high"])
        .name("Shadow Quality")
        .onChange(updateShadowQuality);

      const forestFolder = gui.addFolder("Forest");
      forestFolder.add(params, "treeCount", 50, 2000, 50).name("Trees");
      forestFolder
        .add(params, "forestRadius", 30, 200, 10)
        .name("Forest Radius");

      const treeFolder = gui.addFolder("Tree Structure");
      treeFolder.add(CONFIG, "BRANCH_LEVELS", 2, 6, 1).name("Branch Levels");
      treeFolder
        .add(CONFIG, "BRANCH_ANGLE", 0.2, 1.0, 0.05)
        .name("Branch Angle");
      treeFolder
        .add(CONFIG, "BRANCHES_PER_NODE", 2, 5, 1)
        .name("Branches/Node");
      treeFolder
        .add(CONFIG, "LENGTH_FALLOFF", 0.5, 0.85, 0.01)
        .name("Length Falloff");
      treeFolder
        .add(CONFIG, "RADIUS_FALLOFF", 0.4, 0.7, 0.01)
        .name("Radius Falloff");

      const leafFolder = gui.addFolder("Leaves");
      leafFolder.add(CONFIG, "LEAF_SIZE", 0.3, 1.5, 0.1).name("Leaf Size");
      leafFolder.add(CONFIG, "LEAF_DENSITY", 2, 10, 1).name("Leaf Density");
      leafFolder.add(CONFIG, "LEAF_SPREAD", 0.3, 1.5, 0.1).name("Leaf Spread");

      leafFolder
        .add(CONFIG, "LOD_FADE_START", 30, 250, 5)
        .name("LOD Fade Start")
        .onChange((v) => {
          // Clamp: fadeStart must be less than maxDistance
          const clamped = Math.min(v, CONFIG.LOD_MAX_DISTANCE - 5);
          if (clamped !== v) CONFIG.LOD_FADE_START = clamped;
          if (forest.leafMat)
            forest.leafMat.uniforms.leafFadeStart.value = clamped;
          if (forest.barkMat)
            forest.barkMat.uniforms.leafFadeStart.value = clamped;
        });
      leafFolder
        .add(CONFIG, "LOD_MAX_DISTANCE", 50, 400, 10)
        .name("LOD Max Distance")
        .onChange((v) => {
          // Clamp: maxDistance must be greater than fadeStart
          const clamped = Math.max(v, CONFIG.LOD_FADE_START + 5);
          if (clamped !== v) CONFIG.LOD_MAX_DISTANCE = clamped;
          if (forest.leafMat)
            forest.leafMat.uniforms.maxLeafDistance.value = clamped;
          if (forest.barkMat)
            forest.barkMat.uniforms.maxLeafDistance.value = clamped;
        });

      gui.add(params, "regenerate").name("↻ Regenerate");

      // ============================================================================
      // RENDER LOOP
      // ============================================================================

      function updateStats() {
        const info = renderer.info;
        document.getElementById("statDrawCalls").textContent =
          info.render.calls;
        document.getElementById("statTris").textContent =
          info.render.triangles.toLocaleString();
      }

      /* ---------- Stats ---------- */
      const statsGL = new StatsGL({ trackGPU: true, trackHz: true });
      const statsContainer = document.getElementById("performanceStats");
      statsContainer.classList.add("gl");
      statsContainer.appendChild(statsGL.dom);
      statsGL.init(renderer);

      function animate() {
        requestAnimationFrame(animate);

        // Update leaf sway animation
        if (forest.leafMat) {
          forest.leafMat.uniforms.time.value = performance.now() * 0.001;
        }

        renderer.render(scene, camera);
        updateStats();

        // stats
        if (statsGL) statsGL.update();
      }
      animate();

      const hasMouse = matchMedia("(pointer:fine)").matches;
      const hasKeyboard = !!navigator.keyboard; // only true if real Keyboard API present
      const isTouchDevice =
        "ontouchstart" in window ||
        navigator.maxTouchPoints > 0 ||
        navigator.msMaxTouchPoints > 0;

      const isTouchOnly = isTouchDevice && !hasMouse && !hasKeyboard;

      function resize() {
        const dpr = Math.min(window.devicePixelRatio, isTouchOnly ? 1 : 1.5); // cap pixel ratio to prevent insane resolutions
        renderer.setPixelRatio(dpr);
        renderer.setSize(window.innerWidth, window.innerHeight, true);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      }

      window.addEventListener("resize", resize);
      resize();
    </script>
  </body>
</html>
