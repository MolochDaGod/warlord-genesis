<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Warlords force update</title>
    <style>
      body { margin:0; min-height:100vh; display:grid; place-items:center; background:#080c14; color:#e8eef8; font-family:system-ui,sans-serif; }
      .box { max-width:28rem; padding:1.5rem; border:1px solid #2a3548; border-radius:12px; background:#0e1522; }
      code { color:#7ee37e; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1 style="font-size:1.1rem;margin:0 0 .5rem">Updating Warlords…</h1>
      <p id="s">Clearing caches and loading <code>gw-core-20260712.js</code>.</p>
    </div>
    <script>
      (async function () {
        var s = document.getElementById("s");
        try {
          if (navigator.serviceWorker) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
          }
          if (window.caches && caches.keys) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }
          // Try to evict the dead module from HTTP cache by fetching the new core.
          await fetch("/assets/gw-core-20260712.js?h=a1", { cache: "reload" }).catch(function () {});
          s.textContent = "Redirecting…";
        } catch (e) {
          s.textContent = "Redirecting…";
        }
        location.replace("/?fresh=" + Date.now());
      })();
    </script>
  </body>
</html>
